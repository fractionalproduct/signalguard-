# Development-only services for GitHub Codespaces / local fallback.
#
# IMPORTANT: This is for DEVELOPMENT and TESTING only. It must never be used to
# run permanent trading or monitoring services. Production uses separate managed
# hosting (see docs/cloud-services.md). The postgres/redis here are throwaway dev
# instances, not the system of record.
version: "3.9"

services:
  dev:
    image: mcr.microsoft.com/devcontainers/typescript-node:20
    command: sleep infinity
    volumes:
      - ..:/workspace:cached
    working_dir: /workspace
    environment:
      # Dev-only connection strings; real secrets live in host settings, not here.
      DATABASE_URL: postgres://signalguard:devpassword@postgres:5432/signalguard_dev
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: signalguard
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: signalguard_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
